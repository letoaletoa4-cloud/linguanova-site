<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти - LinguaNova</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar small-nav">
        <div class="logo">LinguaNova</div>
        <ul class="nav-links">
            <li><a href="index.html">Начало</a></li>
            <li><a href="courses.html">Курсове</a></li>
            <li><a href="contacts.html">Контакти</a></li>
            <li><a href="author.html">Автор</a></li>
        </ul>
    </nav>

    <main class="container">
        <h1 class="page-title">Свържете се с нас</h1>

        <section class="contact-grid">
            <div class="contact-box">
                <h2>Информация</h2>
                <p><strong>Адрес:</strong> гр. София, ул. „Примерна“ 10</p>
                <p><strong>Телефон:</strong> 0888 123 456</p>
                <p><strong>Email:</strong> info@linguanova.bg</p>
                <p><strong>Работно време:</strong> Понеделник - Петък, 09:00 - 18:00</p>
            </div>

            <div class="contact-box">
                <h2>Форма за контакт</h2>
                <form>
                    <label for="name">Име</label>
                    <input type="text" id="name" placeholder="Въведете име" required>

                    <label for="email">Имейл</label>
                    <input type="email" id="email" placeholder="Въведете имейл" required>

                    <label for="message">Съобщение</label>
                    <textarea id="message" rows="5" placeholder="Напишете съобщение" required></textarea>

                    <button type="submit" class="btn">Изпрати</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2025 LinguaNova - Езиков център</p>
    </footer>
</body>
</html>
